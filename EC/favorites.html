<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>お気に入り | Mawal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --text:#222222;
      --muted:#666666;
      --beige:#f4efe8;
      --footer:#1b1815;
      --brown:#6b4f3b;
      --brown2:#5a4030;
      --shadow: 0 8px 24px rgba(0,0,0,.08);
      --max:1120px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color:var(--text);
      background:var(--bg);
      line-height:1.6;
    }
    a{ color:inherit; text-decoration:none; }
    img{ max-width:100%; display:block; }
    button, input, select{ font:inherit; }
    .container{
      width:min(var(--max), calc(100% - 48px));
      margin-inline:auto;
    }

    header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(255,255,255,.8);
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(0,0,0,.06);
    }
    .header-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 0;
      gap:14px;
    }
    .brand-text{
      font-family:"Playfair Display", serif;
      font-size:22px;
      color:var(--brown);
      letter-spacing:.08em;
    }
    nav{
      display:flex;
      gap:16px;
      align-items:center;
      font-size:14px;
      color:var(--muted);
      white-space:nowrap;
    }
    nav a{ padding:8px 10px; border-radius:10px; }
    nav a:hover{ background:rgba(0,0,0,.04); color:var(--text); }
    .nav-cta{
      color:#fff;
      background:var(--brown);
    }
    .nav-cta:hover{ background:var(--brown2); color:#fff; }

    .cart-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:10px;
    }
    .cart-pill:hover{ background:rgba(0,0,0,.04); color:var(--text); }
    .cart-badge{
      min-width:22px;
      height:22px;
      padding:0 7px;
      border-radius:999px;
      display:grid;
      place-items:center;
      font-size:12px;
      color:#fff;
      background:var(--brown);
      line-height:1;
    }

    main{ padding:26px 0 70px; }
    .crumbs{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      font-size:12px;
      color:var(--muted);
      margin:6px 0 14px;
    }
    .crumbs a{ color:var(--muted); }
    .crumbs a:hover{ color:var(--text); }
    .crumbs .sep{ opacity:.6; }

    .page-title{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      margin-bottom:14px;
    }
    .page-title h1{
      font-size:30px;
      margin:0;
      letter-spacing:.01em;
      font-family:"Playfair Display", serif;
      font-weight:600;
      color:var(--brown);
    }
    .page-title p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }
    .tools{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:12px 0;
      border-top:1px solid rgba(0,0,0,.04);
      border-bottom:1px solid rgba(0,0,0,.08);
      margin-bottom:16px;
    }
    .btn{
      border:1px solid rgba(0,0,0,.12);
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:10px 12px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      white-space:nowrap;
    }
    .btn:hover{ border-color: rgba(0,0,0,.20); box-shadow: 0 6px 18px rgba(0,0,0,.06); }
    .btn.primary{
      background:var(--brown);
      border-color:var(--brown);
      color:#fff;
    }
    .btn.primary:hover{ background:var(--brown2); border-color:var(--brown2); }
    .count{ font-size:12px; color:var(--muted); }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:18px;
    }

    .card{
      border:1px solid rgba(0,0,0,.08);
      border-radius:0;
      overflow:hidden;
      background:var(--beige);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      display:flex;
      flex-direction:column;
      min-height: 100%;
    }
    .card:hover{
      transform: translateY(-3px);
      box-shadow: var(--shadow);
      border-color: rgba(0,0,0,.18);
    }
    .media{
      aspect-ratio: 1 / 1;
      background:#ddd;
      position:relative;
      overflow:hidden;
    }
    .media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .badge{
      position:absolute;
      left:12px; top:12px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      background:rgba(255,255,255,.92);
      border:1px solid rgba(0,0,0,.08);
      z-index:2;
    }

    .fav{
      position:absolute;
      right:10px; top:10px;
      width:36px; height:36px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.10);
      background:rgba(255,255,255,.92);
      display:grid; place-items:center;
      cursor:pointer;
      z-index:2;
      color: var(--brown);
    }
    .fav:hover{ border-color: rgba(0,0,0,.22); }
    .fav[aria-pressed="true"]{
      background: rgba(107,79,59,.10);
      border-color: rgba(107,79,59,.35);
    }
    .fav svg path{ fill:none; }
    .fav[aria-pressed="true"] svg path{ fill: currentColor; }

    .body{
      padding:14px 14px 16px;
      background:rgba(255,255,255,.35);
      backdrop-filter: blur(2px);
      display:flex;
      flex-direction:column;
      gap:8px;
      flex: 1 1 auto;
    }
    .name{
      margin:0;
      font-size:15px;
      font-weight:600;
      line-height:1.3;
      display:-webkit-box;
      -webkit-box-orient: vertical;
      overflow:hidden;
      min-height: 2.6em;
    }
    .desc{
      margin:0;
      color:var(--muted);
      font-size:13px;
      display:-webkit-box;
      -webkit-box-orient: vertical;
      overflow:hidden;
    }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:auto;
      padding-top:4px;
    }
    .price{
      margin:0;
      font-weight:700;
      letter-spacing:.01em;
    }
    .mini{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .mini span{
      font-size:11px;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.10);
      color:var(--muted);
      background:rgba(255,255,255,.55);
    }

    .empty{
      border:1px dashed rgba(0,0,0,.20);
      border-radius:0;
      padding:18px;
      color:var(--muted);
      background: rgba(0,0,0,.02);
      display:none;
    }
    .empty strong{ color:var(--text); }

    footer{
      background:var(--footer);
      color:#fff;
      padding:44px 0;
      margin-top:56px;
    }
    .footer-bottom{
      margin-top:0;
      padding-top:0;
      color:rgba(255,255,255,.6);
      font-size:12px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%);
      padding:12px 14px;
      border-radius:14px;
      background:rgba(17,17,17,.92);
      color:#fff;
      font-size:14px;
      z-index:200;
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 12px 40px rgba(0,0,0,.28);
      opacity:0;
      pointer-events:none;
      transition: opacity .22s ease;
    }
    .toast.show{ opacity:1; }

    @media (max-width: 980px){
      .grid{ grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px){
      .container{ width:min(var(--max), calc(100% - 32px)); }
      nav a{ display:none; }
      nav a.nav-cta{ display:inline-flex; }
      .page-title{ flex-direction:column; align-items:flex-start; }
      .page-title h1{ font-size:26px; }
      .grid{ grid-template-columns: 1fr; }
      .tools{ flex-direction:column; align-items:stretch; }
      .tools .btn{ justify-content:center; }
    }
  </style>
</head>

<body>
  <header>
    <div class="container">
      <div class="header-inner">
        <a class="brand-text" href="index.html" aria-label="Mawal トップへ">Mawal</a>

        <nav aria-label="Primary">
          <a href="index.html#recommended">おすすめ</a>
          <a href="products.html">商品</a>
          <a href="favorites.html" aria-current="page">お気に入り</a>
          <a href="index.html#about">概要</a>

          <a class="cart-pill" href="cart.html" aria-label="カートへ">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 7h15l-1.5 9h-12L6 7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M6 7 5 4H2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="9" cy="20" r="1.6" fill="currentColor"/>
              <circle cx="18" cy="20" r="1.6" fill="currentColor"/>
            </svg>
            <span>(</span><span id="cartCount" class="cart-badge">0</span><span>)</span>
          </a>

          <a class="nav-cta" href="cart.html">カート</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="crumbs" aria-label="Breadcrumb">
        <a href="index.html">Home</a>
        <span class="sep">/</span>
        <span aria-current="page">お気に入り</span>
      </div>

      <div class="page-title">
        <div>
          <h1>favorites</h1>
          <p>右上のハートで解除できます。</p>
        </div>
        <div class="count" id="favCountText">—</div>
      </div>

      <div class="tools">
        <a class="btn" href="products.html">商品一覧へ戻る</a>
        <button class="btn primary" id="clearFavBtn" type="button">お気に入りを全解除</button>
      </div>

      <div class="empty" id="emptyState">
        <strong>お気に入りがまだありません。</strong><br>
        商品一覧でハートを押すとここに表示されます。
        <div style="margin-top:12px;">
          <a class="btn" href="products.html">商品一覧へ</a>
        </div>
      </div>

      <div class="grid" id="favGrid" aria-live="polite"></div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-bottom">
        <div>© <span id="year"></span> Mawal Inc.</div>
        <div style="color:rgba(255,255,255,.55);">Favorites / Dummy Data</div>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script>
    /* =========================
       Favorites page (localStorage)
       - 価格は「最終提案価格」固定（画像→価格）
       - IDも画像ベース固定（product_01.html と整合）
    ========================== */

    const yen = (n) => "¥" + Number(n).toLocaleString("ja-JP");

    // ★ 最終提案価格（固定）
    const PRICE_BY_IMAGE = {
      "images/Image_fx (1).png": 3800, // コップ
      "images/Image_fx (2).png": 2200, // フォーク
      "images/Image_fx (3).png": 2200, // 箸
      "images/Image_fx (4).png": 6800, // おぼん
      "images/Image_fx (5).png": 1800, // 蜜蝋
      "images/Image_fx.png":     4800, // お椀
      "images/Image_fx (7).png": 3800, // プレート（小）
      "images/Image_fx(8).png":  2200, // スプーン
    };
    const getPriceByImg = (img) => PRICE_BY_IMAGE[img] ?? 3800;

    // ★ 画像→固定ID（お気に入りID整合用）
    const IMAGE_TO_ID = {
      "images/Image_fx (1).png": 1,
      "images/Image_fx (2).png": 2,
      "images/Image_fx (3).png": 3,
      "images/Image_fx (4).png": 4,
      "images/Image_fx (5).png": 5,
      "images/Image_fx.png":     6,
      "images/Image_fx (7).png": 7,
      "images/Image_fx(8).png":  8,
    };
    const getIdByImg = (img) => IMAGE_TO_ID[img] ?? 999;

    const PRODUCT_IMAGES = [
      "images/Image_fx (1).png", // コップ
      "images/Image_fx (2).png", // フォーク
      "images/Image_fx (3).png", // 箸
      "images/Image_fx (4).png", // おぼん
      "images/Image_fx (5).png", // 蜜蝋
      "images/Image_fx.png",     // お椀
      "images/Image_fx (7).png", // プレート
      "images/Image_fx(8).png",  // スプーン
    ];

    // 画像ファイル名 → 種類/商品名（products.htmlと合わせる）
    const IMAGE_TO_INFO = {
      "images/Image_fx (1).png": { type: "コップ",   name: "香りをたのしむ 木のカップ" },
      "images/Image_fx (2).png": { type: "フォーク", name: "口あたりやさしい 木のフォーク" },
      "images/Image_fx (3).png": { type: "箸",       name: "すっとつかめる 八角箸" },
      "images/Image_fx (4).png": { type: "おぼん",   name: "食卓になじむ 木のおぼん" },
      "images/Image_fx (5).png": { type: "蜜蝋",     name: "つや出し みつろうジャム" },
      "images/Image_fx.png":     { type: "お椀",     name: "木肌まろやか お椀" },
      "images/Image_fx (7).png": { type: "プレート", name: "森のうるしコート プレート" },
      "images/Image_fx(8).png":  { type: "スプーン", name: "森の手になじむ 木のスプーン" },
    };

    function getInfoByImg(img){
      return IMAGE_TO_INFO[img] ?? { type: "食器", name: "木のうつわ" };
    }

    // --- Cart badge (same key) ---
    const CART_KEY = "mawal_cart_v1";
    function readCart(){
      try{
        const raw = localStorage.getItem(CART_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr : [];
      }catch{
        return [];
      }
    }
    function cartItemCount(cart){
      return cart.reduce((sum, it) => sum + (Number(it.qty) || 0), 0);
    }
    function updateCartBadge(){
      const count = cartItemCount(readCart());
      const badge = document.getElementById("cartCount");
      if (badge) badge.textContent = String(count);
    }

    // --- Favorites (same key as products.html / product_01.html) ---
    const FAV_KEY = "mawal_favorites_v1";
    function readFavs(){
      try{
        const raw = localStorage.getItem(FAV_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        const ids = Array.isArray(arr) ? arr.map(Number).filter(n => Number.isFinite(n)) : [];
        return new Set(ids);
      }catch{
        return new Set();
      }
    }
    function writeFavs(favSet){
      localStorage.setItem(FAV_KEY, JSON.stringify([...favSet]));
    }

    function toast(msg){
      const t = document.getElementById("toast");
      if (!t) return;
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => t.classList.remove("show"), 1400);
    }

    // ★ Favorites表示用の商品データ：8種を固定で作る（ID/価格/画像が必ず一致）
    const BASE_PRODUCTS = PRODUCT_IMAGES.map((img) => {
      const info = getInfoByImg(img);
      const id = getIdByImg(img);
      const price = getPriceByImg(img);
      const inStock = true; // ダミー：必要なら画像ごとに制御OK
      const badge = "";     // ダミー：必要なら "NEW" 等
      const feats = ["手になじむ", "お手入れ簡単"]; // ダミー
      const name = info.name;
      const desc = `種類：${info.type}。天然木のやさしい手ざわり。毎日の食卓になじむ仕上げです。`;

      return {
        id,
        img,
        name,
        category: info.type,
        features: feats,
        price,
        inStock,
        badge,
        desc
      };
    });

    const el = {
      year: document.getElementById("year"),
      grid: document.getElementById("favGrid"),
      empty: document.getElementById("emptyState"),
      favCountText: document.getElementById("favCountText"),
      clearFavBtn: document.getElementById("clearFavBtn"),
    };

    el.year.textContent = new Date().getFullYear();

    let favSet = readFavs();

    function isFav(id){ return favSet.has(Number(id)); }
    function removeFav(id){
      const n = Number(id);
      if (!Number.isFinite(n)) return;
      if (favSet.has(n)){
        favSet.delete(n);
        writeFavs(favSet);
        toast("お気に入りから削除しました");
      }
    }

    function cardHTML(p){
      const pressed = isFav(p.id) ? "true" : "false";
      return `
        <article class="card">
          <div class="media">
            <a href="product_01.html?img=${encodeURIComponent(p.img)}&id=${encodeURIComponent(p.id)}" aria-label="${p.name}の詳細へ">
              <img src="${p.img}" alt="${p.name}">
            </a>

            ${p.badge ? `<div class="badge">${p.badge}</div>` : ""}

            <button class="fav" type="button"
              data-fav-id="${p.id}"
              aria-pressed="${pressed}"
              aria-label="お気に入り解除">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 21s-7-4.6-9.5-8.6C.8 9.5 2.2 6.6 5.2 5.7c1.8-.6 3.7.1 4.8 1.4 1.1-1.3 3-2 4.8-1.4 3 .9 4.4 3.8 2.7 6.7C19 16.4 12 21 12 21Z"
                  stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <div class="body">
            <h3 class="name">${p.name}</h3>
            <p class="desc">${p.desc}</p>

            <div class="row">
              <p class="price">${yen(p.price)}</p>
              <div class="mini">
                <span>${p.category}</span>
                <span>${p.inStock ? "在庫あり" : "在庫なし"}</span>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function render(){
      const favList = BASE_PRODUCTS.filter(p => favSet.has(p.id));
      el.favCountText.textContent = `${favList.length} 件`;

      const isEmpty = favList.length === 0;
      el.empty.style.display = isEmpty ? "block" : "none";
      el.grid.style.display = isEmpty ? "none" : "grid";

      el.grid.innerHTML = isEmpty ? "" : favList.map(cardHTML).join("");
    }

    // click: remove favorite
    el.grid.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-fav-id]");
      if (!btn) return;
      const id = Number(btn.getAttribute("data-fav-id"));
      removeFav(id);
      render();
    });

    // clear all
    el.clearFavBtn.addEventListener("click", () => {
      favSet = new Set();
      writeFavs(favSet);
      toast("お気に入りを全解除しました");
      render();
    });

    // sync across tabs/pages
    window.addEventListener("storage", () => {
      updateCartBadge();
      favSet = readFavs();
      render();
    });

    updateCartBadge();
    render();
  </script>
</body>
</html>

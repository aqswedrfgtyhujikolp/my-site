<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>商品詳細 | Mawal</title>

  <!-- Font (TOPと統一) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --text:#222222;
      --muted:#666666;
      --line:#e8e8e8;

      /* TOPと同じ配色トーン */
      --beige:#f4efe8;
      --footer:#1b1815;
      --brown:#6b4f3b;
      --brown2:#5a4030;

      --shadow: 0 8px 24px rgba(0,0,0,.08);
      --radius:16px;
      --max:1120px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color:var(--text);
      background:var(--bg);
      line-height:1.75;
    }
    a{ color:inherit; text-decoration:none; }
    img{ max-width:100%; display:block; }
    button, input, select, textarea{ font:inherit; }
    .container{
      width:min(var(--max), calc(100% - 48px));
      margin-inline:auto;
    }

    /* ===== Header (TOPのminimalに寄せる) ===== */
    header{
      position:sticky;
      top:0;
      z-index:60;
      background:rgba(255,255,255,.8);
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(0,0,0,.06);
    }
    .header-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 0;
      gap:14px;
    }
    .brand{
      display:flex;
      align-items:center;
      font-weight:600;
      letter-spacing:0.08em;
      white-space:nowrap;
    }
    .brand-text{
      font-family:"Playfair Display", serif;
      font-size:22px;
      color:var(--brown);
      text-transform:capitalize;
    }
    .brand:hover .brand-text{ opacity:.85; }

    .header-right{
      display:flex;
      gap:16px;
      align-items:center;
      color:var(--muted);
      font-size:14px;
      white-space:nowrap;
    }
    .header-link{
      padding:8px 10px;
      border-radius:10px;
    }
    .header-link:hover{
      background:rgba(0,0,0,.04);
      color:var(--text);
    }
    .cart{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:10px;
    }
    .cart:hover{ background:rgba(0,0,0,.04); color:var(--text); }
    .cart-badge{
      min-width:22px;
      height:22px;
      padding:0 7px;
      border-radius:999px;
      display:grid;
      place-items:center;
      font-size:12px;
      color:#fff;
      background:var(--brown);
      line-height:1;
    }
    .nav-cta{
      color:#fff;
      background:var(--brown);
      padding:8px 10px;
      border-radius:10px;
    }
    .nav-cta:hover{ background:var(--brown2); color:#fff; }

    /* ===== Page ===== */
    main{ padding:22px 0 80px; }
    .crumbs{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      font-size:12px;
      color:var(--muted);
      margin:6px 0 18px;
    }
    .crumbs a{ color:var(--muted); }
    .crumbs a:hover{ color:var(--text); }
    .crumbs .sep{ opacity:.6; }

    /* ===== Two-column layout ===== */
    .product-layout{
      display:grid;
      grid-template-columns: 1.25fr .95fr;
      gap:32px;
      align-items:start;
    }

    /* Left: gallery */
    .gallery{
      display:grid;
      gap:18px;
    }
    .shot{
      background:var(--beige);
      border-radius:0;
      overflow:hidden;
      border:1px solid rgba(0,0,0,.08);
      cursor: zoom-in;
    }
    .shot img{
      width:100%;
      height:auto;
      display:block;
    }

    /* Right: details */
    .details{
      position:sticky;
      top:86px;
      align-self:start;
      padding-right:4px;
    }
    .title{
      font-size:34px;
      font-weight:600;
      letter-spacing:.01em;
      margin:0 0 10px;
      line-height:1.2;
      font-family:"Playfair Display", serif;
      color:var(--brown);
    }
    .price-row{
      display:flex;
      flex-wrap:wrap;
      align-items:baseline;
      gap:10px 12px;
      margin-bottom:8px;
    }
    .price{
      font-size:18px;
      font-weight:800;
      letter-spacing:.01em;
    }
    .tax{
      color:var(--muted);
      font-size:13px;
    }
    .ship-note{
      color:var(--muted);
      font-size:13px;
      margin:0 0 18px;
    }
    .desc{
      color:#2a2a2a;
      font-size:14px;
      margin:0 0 14px;
      white-space:pre-line;
    }

    .divider{
      height:1px;
      background:rgba(0,0,0,.18);
      margin:24px 0;
    }

    .spec-title{
      margin:0 0 10px;
      font-size:14px;
      font-weight:800;
      letter-spacing:.02em;
    }
    .specs{
      margin:0;
      padding-left:18px;
      color:#2a2a2a;
      font-size:14px;
    }
    .specs li{ margin:7px 0; }

    /* Purchase box (TOPのカードに寄せる) */
    .purchase{
      margin-top:22px;
      border:1px solid rgba(0,0,0,.10);
      border-radius:0;
      padding:14px;
      background:var(--beige);
    }
    .row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-bottom:10px;
    }
    .field label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:0 0 6px;
    }
    .field select, .field input{
      width:100%;
      padding:10px 12px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:14px;
      outline:none;
      background:#fff;
      font-size:14px;
    }
    .field select:focus, .field input:focus{
      border-color: rgba(107,79,59,.45);
      box-shadow: 0 0 0 4px rgba(107,79,59,.10);
    }
    .qty{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .qty button{
      width:40px;height:40px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.12);
      background:#fff;
      cursor:pointer;
    }
    .qty button:hover{ border-color: rgba(0,0,0,.22); }
    .qty input{
      text-align:center;
      width:100%;
      max-width:110px;
    }
    .actions{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
      margin-top:10px;
    }
    .btn{
      border:1px solid rgba(0,0,0,.12);
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:12px 14px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-size:14px;
      white-space:nowrap;
    }
    .btn:hover{ border-color: rgba(0,0,0,.20); box-shadow: 0 6px 18px rgba(0,0,0,.06); }
    .btn.primary{
      background:var(--brown);
      border-color:var(--brown);
      color:#fff;
    }
    .btn.primary:hover{ background:var(--brown2); border-color:var(--brown2); }
    .btn.ghost{
      background:transparent;
      border-color: rgba(0,0,0,.14);
    }
    .stock{
      margin:8px 0 0;
      font-size:12px;
      color:var(--muted);
    }

    /* Related */
    .below{
      margin-top:40px;
      border-top:1px solid var(--line);
      padding-top:28px;
    }
    .subhead{
      font-size:18px;
      margin:0 0 12px;
      letter-spacing:.01em;
    }
    .related{
      display:flex;
      gap:14px;
      overflow:auto hidden;
      padding:8px 2px 14px;
      -webkit-overflow-scrolling: touch;
    }
    .related::-webkit-scrollbar{ height:8px; }
    .related::-webkit-scrollbar-thumb{ background:rgba(0,0,0,.12); border-radius:999px; }

    .mini{
      flex:0 0 240px;
      border:1px solid rgba(0,0,0,.08);
      border-radius:0;
      overflow:hidden;
      background:var(--beige);
      cursor:pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .mini:hover{ transform:translateY(-2px); box-shadow: var(--shadow); }
    .mini .mimg{ aspect-ratio: 4/3; background:linear-gradient(135deg, rgba(107,79,59,.12), rgba(0,0,0,.02)); }
    .mini .mimg img{ width:100%; height:100%; object-fit:cover; display:block; }
    .mini .mbody{ padding:12px; display:grid; gap:6px; background:rgba(255,255,255,.35); backdrop-filter: blur(2px); }
    .mini .mname{ margin:0; font-weight:700; font-size:14px; line-height:1.3; }
    .mini .mprice{ margin:0; font-weight:800; font-size:14px; }

    /* Modal */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.6);
      display:none;
      z-index:100;
    }
    .overlay.open{ display:block; }
    .modal{
      position:fixed;
      inset:0;
      display:none;
      z-index:110;
      place-items:center;
      padding:24px;
    }
    .modal.open{ display:grid; }
    .modal-inner{
      width:min(1100px, 96vw);
      max-height:86vh;
      background:#111;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      box-shadow: 0 16px 60px rgba(0,0,0,.45);
      position:relative;
    }
    .modal-inner img{
      width:100%;
      height:86vh;
      max-height:86vh;
      object-fit:contain;
      background:#111;
    }
    .close{
      position:absolute;
      right:10px; top:10px;
      width:40px;height:40px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.25);
      color:#fff;
      cursor:pointer;
      display:grid;
      place-items:center;
      backdrop-filter: blur(6px);
    }
    .close:hover{ border-color: rgba(255,255,255,.35); }

    /* Toast */
    .toast{
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%);
      padding:12px 14px;
      border-radius:14px;
      background:rgba(17,17,17,.92);
      color:#fff;
      font-size:14px;
      z-index:200;
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 12px 40px rgba(0,0,0,.28);
      opacity:0;
      pointer-events:none;
      transition: opacity .22s ease;
    }
    .toast.show{ opacity:1; }

    /* ===== Responsive ===== */
    @media (max-width: 980px){
      .product-layout{ grid-template-columns: 1fr; }
      .details{ position:static; }
      .title{ font-size:28px; }
    }
    @media (max-width: 560px){
      .container{ width:min(var(--max), calc(100% - 32px)); }
      .header-right .header-link{ display:none; }
      .title{ font-size:24px; }
      .row{ grid-template-columns: 1fr; }
      .qty input{ max-width: 100%; }
    }
  </style>
</head>

<body>
  <header>
    <div class="container">
      <div class="header-inner">
        <a class="brand" href="index.html" aria-label="Mawal トップへ">
          <span class="brand-text">Mawal</span>
        </a>

        <div class="header-right" aria-label="Header links">
          <a class="cart" href="cart.html" aria-label="Cart">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 7h15l-1.5 9h-12L6 7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M6 7 5 4H2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="9" cy="20" r="1.6" fill="currentColor"/>
              <circle cx="18" cy="20" r="1.6" fill="currentColor"/>
            </svg>
            <span>(</span><span id="cartCount" class="cart-badge">0</span><span>)</span>
          </a>
          <a class="header-link" href="products.html">商品</a>
          <a class="nav-cta" href="products.html">商品を見る</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="crumbs" aria-label="Breadcrumb">
        <a href="index.html">Home</a>
        <span class="sep">/</span>
        <a href="products.html">商品</a>
        <span class="sep">/</span>
        <span aria-current="page" id="crumbName">—</span>
      </div>

      <div class="product-layout">
        <!-- Left: images -->
        <section class="gallery" aria-label="Product images">
          <figure class="shot" data-zoom="0" aria-label="Image 1">
            <img id="img0" alt="">
          </figure>
          <figure class="shot" data-zoom="1" aria-label="Image 2">
            <img id="img1" alt="">
          </figure>
        </section>

        <!-- Right: details -->
        <aside class="details" aria-label="Product details">
          <h1 class="title" id="title">—</h1>

          <div class="price-row">
            <div class="price" id="priceText">JPY —</div>
            <div class="tax">(Tax excluded)</div>
          </div>
          <p class="ship-note">配送料はチェックアウト時に計算されます。</p>

          <p class="desc" id="desc">—</p>

          <div class="divider"></div>

          <h2 class="spec-title">製品表記事項</h2>
          <ul class="specs" id="specs"></ul>

          <div class="purchase" aria-label="Purchase box">
            <div class="row">
              <div class="field">
                <label for="finish">仕上げ</label>
                <select id="finish">
                  <option>オイル仕上げ</option>
                  <option>蜜蝋仕上げ</option>
                  <option>ウレタン仕上げ</option>
                </select>
              </div>
              <div class="field">
                <label for="size">サイズ</label>
                <select id="size">
                  <option>S</option>
                  <option>M</option>
                  <option>L</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label>数量</label>
              <div class="qty">
                <button type="button" id="minus" aria-label="Decrease">−</button>
                <input id="qty" type="text" inputmode="numeric" value="1" aria-label="Quantity">
                <button type="button" id="plus" aria-label="Increase">＋</button>
              </div>
              <div class="stock" id="stockText">—</div>
            </div>

            <div class="actions">
              <button class="btn primary" type="button" id="addToCart">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M6 7h15l-1.5 9h-12L6 7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M6 7 5 4H2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                カートに入れる
              </button>
              <button class="btn ghost" type="button" id="favBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 21s-7-4.6-9.5-8.6C.8 9.5 2.2 6.6 5.2 5.7c1.8-.6 3.7.1 4.8 1.4 1.1-1.3 3-2 4.8-1.4 3 .9 4.4 3.8 2.7 6.7C19 16.4 12 21 12 21Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
                お気に入り
              </button>
            </div>
          </div>
        </aside>
      </div>

      <section class="below" aria-label="Related products">
        <h2 class="subhead">関連商品</h2>
        <div class="related" id="related"></div>
      </section>
    </div>
  </main>

  <!-- Modal -->
  <div class="overlay" id="overlay" aria-hidden="true"></div>
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Image zoom">
    <div class="modal-inner">
      <button class="close" id="closeModal" type="button" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <img id="modalImg" alt="">
    </div>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script>
    /* =========================
       Wood tableware product detail (dummy)
       - 画像名→食器種別 に合わせて商品名/説明/仕様を自動差し替え
       - 価格は「最終提案価格」に固定（products.html と同じ）
       - どの商品詳細として開くかは ?img= で指定（例: product_01.html?img=images/Image_fx%20(1).png）
       - 指定が無い場合はコップ(1)を表示
       - （任意）?id= があればお気に入り/カートのIDとして優先利用
    ========================== */

    // ★ 最終提案価格まとめ（固定：products.html と同じ）
    const PRICE_BY_IMAGE = {
      "images/Image_fx (1).png": 3800, // コップ
      "images/Image_fx (2).png": 2200, // フォーク
      "images/Image_fx (3).png": 2200, // 箸
      "images/Image_fx (4).png": 6800, // おぼん
      "images/Image_fx (5).png": 1800, // 蜜蝋
      "images/Image_fx.png":     4800, // お椀
      "images/Image_fx (7).png": 3800, // プレート（小）
      "images/Image_fx(8).png":  2200, // スプーン
    };

    function getPriceByImg(img){
      return PRICE_BY_IMAGE[img] ?? 3800;
    }

    // ===== Image mapping (あなたの指定) =====
    const IMAGE_TO_INFO = {
      "images/Image_fx (1).png": { type: "コップ",   baseName: "香りをたのしむ 木のカップ" },
      "images/Image_fx (2).png": { type: "フォーク", baseName: "口あたりやさしい 木のフォーク" },
      "images/Image_fx (3).png": { type: "箸",       baseName: "すっとつかめる 八角箸" },
      "images/Image_fx (4).png": { type: "おぼん",   baseName: "食卓になじむ 木のおぼん" },
      "images/Image_fx (5).png": { type: "蜜蝋",     baseName: "つや出し みつろうジャム" },
      "images/Image_fx.png":     { type: "お椀",     baseName: "木肌まろやか お椀" },
      "images/Image_fx (7).png": { type: "プレート", baseName: "森のうるしコート プレート" },
      "images/Image_fx(8).png":  { type: "スプーン", baseName: "森の手になじむ 木のスプーン" },
    };

    function getInfoByImg(img){
      return IMAGE_TO_INFO[img] ?? { type:"食器", baseName:"木のうつわ" };
    }

    // 画像ごとに固定ID（お気に入り/関連表示の一貫性用）
    const IMAGE_TO_ID = {
      "images/Image_fx (1).png": 1,
      "images/Image_fx (2).png": 2,
      "images/Image_fx (3).png": 3,
      "images/Image_fx (4).png": 4,
      "images/Image_fx (5).png": 5,
      "images/Image_fx.png":     6,
      "images/Image_fx (7).png": 7,
      "images/Image_fx(8).png":  8,
    };
    function getIdByImg(img){
      return IMAGE_TO_ID[img] ?? 999;
    }

    // ===== Pick target product by query (?img=) =====
    const params = new URLSearchParams(location.search);
    const pickedImg = params.get("img") || "images/Image_fx (1).png";
    const info = getInfoByImg(pickedImg);

    // ===== Per-type copy/specs =====
    function buildDetail(type){
      switch(type){
        case "コップ":
          return {
            name: `${info.baseName}`,
            desc:
`天然木のあたたかさを、そのまま手のひらへ。
口あたりがやわらかく、飲み物の香りがふわっと立ち上がる木のカップです。

仕上げは食器用のオイル／蜜蝋で、しっとりした触り心地。
毎日のコーヒーやお茶、朝の一杯にちょうどいい相棒です。`,
            specs: [
              "食洗器：非推奨（手洗い推奨）",
              "電子レンジ：非対応",
              "素材：天然木（無垢材）",
              "仕上げ：食器用オイル / 蜜蝋（選択）",
              "容量目安：250ml",
              "サイズ：口径 約80mm / 高さ 約95mm"
            ]
          };
        case "フォーク":
          return {
            name: `${info.baseName}`,
            desc:
`金属とは違う、やさしい口あたりの木製フォーク。
熱が伝わりにくいので、温かい料理でも持ちやすく、カトラリー音も静かです。

サラダやケーキ、フルーツに。家族用に揃えるのもおすすめ。`,
            specs: [
              "食洗器：非推奨（手洗い推奨）",
              "電子レンジ：非対応",
              "素材：天然木",
              "仕上げ：食器用オイル / 蜜蝋（選択）",
              "長さ：約160mm",
              "注意：長時間のつけ置きは避けてください"
            ]
          };
        case "箸":
          return {
            name: `${info.baseName}`,
            desc:
`指に沿う八角形で、すっとつかめる木のお箸。
表面はなめらかに磨き上げ、口当たりも軽やか。

毎日のごはんに使いやすい、飽きのこない一本です。`,
            specs: [
              "食洗器：非推奨（手洗い推奨）",
              "電子レンジ：非対応",
              "素材：天然木",
              "仕上げ：オイル / 蜜蝋（選択）",
              "長さ：22.5cm",
              "形状：八角"
            ]
          };
        case "おぼん":
          return {
            name: `${info.baseName}`,
            desc:
`食卓の景色を整える、木のおぼん。
コップと小鉢をのせても安定し、運ぶときも手にしっくり。

朝食、ティータイム、ワークデスクの小物置きにも使えます。`,
            specs: [
              "食洗器：非推奨（手洗い推奨）",
              "電子レンジ：非対応",
              "素材：天然木",
              "仕上げ：オイル / 蜜蝋（選択）",
              "サイズ：約 300×200mm",
              "注意：高温の鍋など直置きは避けてください"
            ]
          };
        case "蜜蝋":
          return {
            name: `${info.baseName}`,
            desc:
`木製食器のための“塗るやつ”＝蜜蝋ケア。
乾燥でカサついた表面に薄く塗り、布で磨くと、しっとりした艶が戻ります。

定期的なお手入れで、割れやシミを防ぎ、長く育てていけます。`,
            specs: [
              "用途：木製食器・木製カトラリー用",
              "主成分：蜜蝋（みつろう）",
              "内容量：20g",
              "使い方：薄く塗って乾拭き（塗りすぎ注意）",
              "注意：直射日光・高温を避けて保管",
              "備考：食器に使用できるグレードを想定（ダミー）"
            ]
          };
        case "お椀":
          return {
            name: `${info.baseName}`,
            desc:
`手に取った瞬間にわかる、木のお椀の軽さ。
熱が伝わりにくく、汁物が熱い日でも持ちやすいのが魅力です。

木目の表情は一つずつ違う、世界に一つのお椀。`,
            specs: [
              "食洗器：非推奨（手洗い推奨）",
              "電子レンジ：非対応",
              "素材：天然木",
              "仕上げ：オイル / 蜜蝋（選択）",
              "容量目安：350ml",
              "サイズ：直径 約110mm / 高さ 約70mm"
            ]
          };
        case "プレート":
          return {
            name: `${info.baseName}`,
            desc:
`盛り付けるだけで、料理がやさしく見える木のプレート。
軽くて扱いやすく、食卓にあたたかい雰囲気を足してくれます。

パンやお菓子、ワンプレートごはんにも。`,
            specs: [
              "食洗器：非推奨（手洗い推奨）",
              "電子レンジ：非対応",
              "素材：天然木",
              "仕上げ：オイル / 蜜蝋（選択）",
              "サイズ：直径 約210mm",
              "注意：水切れの良い場所で乾燥"
            ]
          };
        case "スプーン":
          return {
            name: `${info.baseName}`,
            desc:
`口あたりがやさしく、スープやヨーグルトにもぴったりの木のスプーン。
冷たさ・熱さが手に伝わりにくく、毎日使いやすい一本です。`,
            specs: [
              "食洗器：非推奨（手洗い推奨）",
              "電子レンジ：非対応",
              "素材：天然木",
              "仕上げ：オイル / 蜜蝋（選択）",
              "長さ：約155mm",
              "注意：長時間のつけ置きは避けてください"
            ]
          };
        default:
          return {
            name: `${info.baseName}`,
            desc: `天然木のやさしい質感を楽しめる木製食器です。`,
            specs: [
              "食洗器：非推奨（手洗い推奨）",
              "電子レンジ：非対応",
              "素材：天然木",
              "仕上げ：オイル / 蜜蝋（選択）"
            ]
          };
      }
    }

    const detail = buildDetail(info.type);

    // ★ 価格は画像により固定
    const fixedPrice = getPriceByImg(pickedImg);

    // ★ id は ?id= があれば優先、なければ画像ベース固定ID
    const pickedId = (() => {
      const raw = params.get("id");
      const n = raw ? Number(raw) : NaN;
      return Number.isFinite(n) ? n : getIdByImg(pickedImg);
    })();

    // ===== Product object (cart用) =====
    const PRODUCT = {
      id: pickedId,
      name: detail.name,
      unitPrice: fixedPrice,
      inStock: true,
      images: [pickedImg, pickedImg],
      fallbackTones: ["#6b4f3b", "#d8b49a"],
    };

    const CART_KEY = "mawal_cart_v1";

    function yen(n){ return "¥" + Number(n).toLocaleString("ja-JP"); }

    function readCart(){
      try{
        const raw = localStorage.getItem(CART_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr : [];
      }catch{ return []; }
    }
    function writeCart(cart){
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    function clampQty(v){
      const s = String(v ?? "").replace(/[^\d]/g, "");
      const n = s ? Number(s) : 1;
      return Math.max(1, Math.min(99, n));
    }

    function toast(msg){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => t.classList.remove("show"), 1400);
    }

    // ===== fallback image (画像が無い時) =====
    function svgPhoto(tone = "#6b4f3b", type = "dark"){
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="${tone}" stop-opacity=".95"/>
              <stop offset=".55" stop-color="#0b1220" stop-opacity=".92"/>
              <stop offset="1" stop-color="#0b1220" stop-opacity=".98"/>
            </linearGradient>
            <radialGradient id="r" cx="35%" cy="30%" r="70%">
              <stop offset="0" stop-color="#ffffff" stop-opacity=".10"/>
              <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <rect width="100%" height="100%" fill="${type === "light" ? "#eef2f6" : "url(#g)"}"/>
          <rect width="100%" height="100%" fill="url(#r)"/>
          <g opacity=".9">
            <rect x="520" y="220" width="560" height="660" rx="140" fill="#ffffff" opacity=".10"/>
            <rect x="610" y="310" width="380" height="480" rx="120" fill="#ffffff" opacity=".10"/>
          </g>
        </svg>
      `;
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    function setImgWithFallback(imgEl, src, tone, type){
      imgEl.alt = PRODUCT.name;
      imgEl.src = src;
      imgEl.onerror = () => {
        imgEl.onerror = null;
        imgEl.src = svgPhoto(tone, type);
      };
    }

    // ===== DOM bind =====
    const img0 = document.getElementById("img0");
    const img1 = document.getElementById("img1");
    const title = document.getElementById("title");
    const crumbName = document.getElementById("crumbName");
    const priceText = document.getElementById("priceText");
    const stockText = document.getElementById("stockText");
    const descEl = document.getElementById("desc");
    const specsEl = document.getElementById("specs");

    title.textContent = PRODUCT.name;
    crumbName.textContent = PRODUCT.name;
    priceText.textContent = `JPY ${Number(PRODUCT.unitPrice).toLocaleString("ja-JP")}`;
    stockText.textContent = PRODUCT.inStock ? "在庫あり（ダミー）" : "在庫なし（ダミー）";
    descEl.textContent = detail.desc;

    specsEl.innerHTML = detail.specs.map(s => `<li>${s}</li>`).join("");

    setImgWithFallback(img0, PRODUCT.images[0], PRODUCT.fallbackTones[0], "dark");
    setImgWithFallback(img1, PRODUCT.images[1], PRODUCT.fallbackTones[1], "light");

    // ===== Cart count =====
    function updateCartBadge(){
      const cart = readCart();
      const count = cart.reduce((sum, it) => sum + (Number(it.qty) || 0), 0);
      document.getElementById("cartCount").textContent = String(count);
    }
    updateCartBadge();
    window.addEventListener("storage", updateCartBadge);

    // ===== Modal zoom =====
    const overlay = document.getElementById("overlay");
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");
    const closeModal = document.getElementById("closeModal");

    function openModal(src){
      modalImg.src = src;
      overlay.classList.add("open");
      modal.classList.add("open");
      overlay.setAttribute("aria-hidden","false");
    }
    function close(){
      overlay.classList.remove("open");
      modal.classList.remove("open");
      overlay.setAttribute("aria-hidden","true");
      modalImg.src = "";
    }

    const zoomSrc = [
      () => img0.currentSrc || img0.src,
      () => img1.currentSrc || img1.src,
    ];

    document.querySelectorAll(".shot").forEach(fig => {
      fig.addEventListener("click", () => {
        const idx = Number(fig.getAttribute("data-zoom")) || 0;
        openModal(zoomSrc[idx]());
      });
    });

    overlay.addEventListener("click", close);
    closeModal.addEventListener("click", close);
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.classList.contains("open")) close();
    });

    // ===== Qty controls =====
    const qtyEl = document.getElementById("qty");
    document.getElementById("minus").addEventListener("click", () => {
      qtyEl.value = String(Math.max(1, clampQty(qtyEl.value) - 1));
    });
    document.getElementById("plus").addEventListener("click", () => {
      qtyEl.value = String(clampQty(qtyEl.value) + 1);
    });
    qtyEl.addEventListener("input", () => {
      qtyEl.value = String(clampQty(qtyEl.value));
    });

    // ===== Add to cart =====
    document.getElementById("addToCart").addEventListener("click", () => {
      const qty = clampQty(qtyEl.value);
      const finish = document.getElementById("finish").value;
      const size = document.getElementById("size").value;

      const cart = readCart();
      const id = PRODUCT.id;

      // 仕上げ/サイズ違いを別行にしたいのでキーを持つ
      const key = `${finish}|${size}|${pickedImg}|${id}`;
      const existing = cart.find(x => Number(x.id) === Number(id) && x._variantKey === key);

      if (existing){
        existing.qty = clampQty((Number(existing.qty) || 0) + qty);
      }else{
        cart.push({
          id,
          name: PRODUCT.name,
          unitPrice: PRODUCT.unitPrice,
          qty,
          img: pickedImg,
          inStock: PRODUCT.inStock,
          variant: `種類：${info.type} / 仕上げ：${finish} / サイズ：${size}`,
          _variantKey: key
        });
      }

      writeCart(cart);
      updateCartBadge();
      toast(`カートに追加しました（${qty}点）`);
    });

    // ===== Favorite =====
    const FAV_KEY = "mawal_favorites_v1";
    function readFavs(){
      try{
        const raw = localStorage.getItem(FAV_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        const ids = Array.isArray(arr) ? arr.map(Number).filter(n => Number.isFinite(n)) : [];
        return new Set(ids);
      }catch{ return new Set(); }
    }
    function writeFavs(set){
      localStorage.setItem(FAV_KEY, JSON.stringify([...set]));
    }

    let favSet = readFavs();
    const favBtn = document.getElementById("favBtn");

    function syncFavBtn(){
      const on = favSet.has(Number(PRODUCT.id));
      favBtn.style.borderColor = on ? "rgba(107,79,59,.55)" : "rgba(0,0,0,.14)";
      favBtn.style.background = on ? "rgba(107,79,59,.10)" : "transparent";
      favBtn.setAttribute("aria-pressed", on ? "true" : "false");
    }
    syncFavBtn();

    favBtn.addEventListener("click", () => {
      const id = Number(PRODUCT.id);
      const on = favSet.has(id);
      if (on) favSet.delete(id);
      else favSet.add(id);
      writeFavs(favSet);
      syncFavBtn();
      toast(on ? "お気に入りを解除しました" : "お気に入りに追加しました");
    });

    // ===== Related (価格も画像→固定価格で統一) =====
    function svgMini(label){
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="900" height="675">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="${getComputedStyle(document.documentElement).getPropertyValue("--brown").trim()}" stop-opacity=".18"/>
              <stop offset=".7" stop-color="#ffffff" stop-opacity=".9"/>
              <stop offset="1" stop-color="#ffffff" stop-opacity="1"/>
            </linearGradient>
          </defs>
          <rect width="100%" height="100%" fill="url(#g)"/>
          <rect x="48" y="48" width="804" height="579" rx="44" fill="#fff" fill-opacity=".55" stroke="#000" stroke-opacity=".06"/>
          <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
            font-family="system-ui, -apple-system, Segoe UI, Roboto, Noto Sans JP, sans-serif"
            font-size="44" font-weight="800" fill="#111" fill-opacity=".70">${label}</text>
        </svg>
      `;
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    const relatedImgs = Object.keys(IMAGE_TO_INFO).filter(x => x !== pickedImg);
    const relatedData = relatedImgs.slice(0,4).map((img) => {
      const r = getInfoByImg(img);
      const base = buildDetail(r.type);
      const price = getPriceByImg(img);
      const id = getIdByImg(img);
      return { name: base.name, price, img, id };
    });

    const related = document.getElementById("related");
    related.innerHTML = relatedData.map((p,i) => `
      <a class="mini" href="product_01.html?img=${encodeURIComponent(p.img)}&id=${encodeURIComponent(p.id)}" aria-label="${p.name}の詳細へ">
        <div class="mimg">
          <img src="${p.img}" alt="" onerror="this.onerror=null; this.src='${svgMini("Item " + (i+1))}';">
        </div>
        <div class="mbody">
          <h3 class="mname">${p.name}</h3>
          <p class="mprice">JPY ${p.price.toLocaleString("ja-JP")}</p>
        </div>
      </a>
    `).join("");
  </script>
</body>
</html>
